name: Post-Merge Verification

on:
  push:
    branches: [main, feat/initial-site-build]

jobs:
  verify-main:
    name: Verify Main Branch
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Build project
        run: npm run build

      - name: Run all tests
        run: npm run test:all

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Alert on failure
        if: failure()
        run: |
          echo "::error::Main branch tests failed after merge!"
          echo "Immediate action required:"
          echo "1. Check the test failure details above"
          echo "2. Determine if rollback or hotfix is needed"
          echo "3. Do not deploy until tests pass"
          exit 1

      - name: Success
        if: success()
        run: |
          echo "✅ Main branch verification passed"
          echo "Safe to deploy"
